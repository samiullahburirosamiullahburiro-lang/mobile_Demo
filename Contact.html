<!DOCTYPE html>
<html lang="en">
<head> 
<meta charset="UTF-8">
<title>
Contact </title>
<style>
	body{
		font-family: Arial;
		padding: 20px;
		max-width:500px;
		margin: auto;}

	input, textarea, button{
		width: 100%;
		padding: 10px;
		margin: 8px;
		border: 1px solid #ccc;
		border-radius: 4px;
		}
	button{
		background: #1877f2;
		color: white;
		border: none;
		cursor: pointer;
		}

button: hover { background: #166fe5; }

</style>
</head>
<body style="background-color: lightskyblue;">
<center>
<h2> Contact Us </h2></center>
<form action="#" method="POST">

<label for="name"> Full Name: </label>
<input type="text" id="name" name="name" placeholder="Enter Full Name" required>

<label for="email"> Email: </label>
<input type="email" id="email" name="email" placeholder="email@.com">

<label for="Mobile No"> Mobile No: </label>
<input type="tel" id="Mobile No" name="Mobile No" placeholder="Enter Your Mobile No"> 

<label for="Address"> Address: </label>
<input type="text" id="Address" name="Address" placeholder="Enter Your Address">

<label for="Message"> Message: </label>
<textarea id="Massage" name="Massage" rows="4" placeholder="Enter Your Message"></textarea>

<button type="submit">Submit </button>




</form>

</html>
</body>
